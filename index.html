<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindMirror — Visualize Your Mind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="mood-neutral" data-theme="dark">

  <!-- Ambient background layers -->
  <div id="bg-layer" class="bg-layer">
    <canvas id="particle-canvas"></canvas>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">MindMirror</span>
    </div>
    <nav class="header-controls">
      <button id="btn-theme" class="ctrl-btn" title="Toggle theme">
        <span class="icon-sun">☀</span><span class="icon-moon">◑</span>
      </button>
      <button id="btn-sound" class="ctrl-btn sound-btn" title="Ambient sound">
        <span>♫</span>
      </button>
      <button id="btn-export" class="ctrl-btn" title="Export mind map" style="display:none">
        <span>↓</span>
      </button>
    </nav>
  </header>

  <!-- ============ INPUT SCREEN ============ -->
  <main id="screen-input" class="screen screen-input active">
    <div class="input-hero">
      <p class="hero-eyebrow">Your thoughts, visualized</p>
      <h1 class="hero-title">What's on your<br/><em>mind</em> right now?</h1>
      <p class="hero-sub">Type anything. We'll map the patterns beneath.</p>

      <div class="input-container">
        <textarea
          id="thought-input"
          placeholder="Type what's on your mind… fears, hopes, plans, feelings. There's no wrong answer."
          rows="5"
          maxlength="2000"
        ></textarea>
        <div class="input-meta">
          <span id="char-count">0 / 2000</span>
          <div class="typing-indicator" id="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
        <button id="btn-analyze" class="analyze-btn" disabled>
          <span class="btn-text">Analyze Mind</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <!-- Timeline history -->
      <div class="timeline-section" id="timeline-section" style="display:none">
        <p class="timeline-label">Previous sessions</p>
        <div class="timeline-bubbles" id="timeline-bubbles"></div>
      </div>
    </div>
  </main>

  <!-- ============ VISUALIZATION SCREEN ============ -->
  <main id="screen-viz" class="screen screen-viz">

    <!-- Left: Brain Canvas -->
    <section class="viz-panel">
      <div class="viz-toolbar">
        <button id="btn-back" class="back-btn">← New thought</button>
        <button id="btn-deep" class="deep-btn">⬡ Deep Insight</button>
      </div>
      <canvas id="brain-canvas"></canvas>
      <div class="canvas-hint">Hover nodes · Click for insight</div>
    </section>

    <!-- Right: Insight Panel -->
    <aside class="insight-panel glass">
      <div class="insight-score">
        <div class="score-ring">
          <svg viewBox="0 0 120 120" class="ring-svg">
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52"/>
          </svg>
          <div class="score-value">
            <span id="score-number">0</span>
            <small>Mind Score</small>
          </div>
        </div>
      </div>

      <div class="mood-summary">
        <h3 id="mood-headline">Analyzing…</h3>
        <p id="mood-sub" class="mood-sub"></p>
      </div>

      <div class="emotion-bars" id="emotion-bars"></div>

      <div class="reflection-section">
        <p class="reflection-label">Reflection prompts</p>
        <div class="reflections" id="reflections"></div>
        <button id="btn-random-reflect" class="subtle-btn">🔮 Generate new prompt</button>
      </div>

      <div class="node-detail glass hidden" id="node-detail">
        <button class="close-detail" id="close-detail">×</button>
        <p class="node-detail-tag" id="node-detail-tag"></p>
        <p class="node-detail-text" id="node-detail-text"></p>
        <p class="node-detail-insight" id="node-detail-insight"></p>
      </div>
    </aside>
  </main>

  <!-- Tooltip -->
  <div class="node-tooltip" id="node-tooltip"></div>

  <!-- Pulse overlay for emotion -->
  <div class="pulse-overlay" id="pulse-overlay"></div>

  <audio id="ambient-audio" loop>
    <!-- We'll generate rain sound via AudioContext in JS -->
  </audio>

  <script src="analysisEngine.js"></script>
  <script src="visualization.js"></script>
  <script src="uiController.js"></script>
</body>
</html>
