<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindMirror — Visualize Your Mind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
/* ============================================
   MindMirror — style.css
   Aesthetic: Dark cosmic glass, editorial
============================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Colors */
  --c-bg: #050810;
  --c-surface: rgba(255,255,255,0.04);
  --c-surface-hover: rgba(255,255,255,0.07);
  --c-border: rgba(255,255,255,0.08);
  --c-text: #e8eaf0;
  --c-text-dim: rgba(232,234,240,0.45);
  --c-text-faint: rgba(232,234,240,0.2);
  --c-accent: #7b8cff;
  --c-accent-glow: rgba(123,140,255,0.25);

  /* Mood colors */
  --c-calm: #4fc3f7;
  --c-stress: #f06292;
  --c-goal: #69f0ae;
  --c-neutral: #ffd54f;
  --c-negative: #ef5350;

  /* Blobs */
  --blob1: #1a237e;
  --blob2: #4a148c;
  --blob3: #0d47a1;

  /* Typography */
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;

  /* Sizes */
  --r-card: 20px;
  --r-input: 16px;

  /* Transitions */
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

[data-theme="light"] {
  --c-bg: #f0f2fa;
  --c-surface: rgba(255,255,255,0.65);
  --c-surface-hover: rgba(255,255,255,0.85);
  --c-border: rgba(0,0,0,0.08);
  --c-text: #0d0e1a;
  --c-text-dim: rgba(13,14,26,0.5);
  --c-text-faint: rgba(13,14,26,0.2);
  --c-accent: #5660e8;
  --c-accent-glow: rgba(86,96,232,0.2);
  --blob1: #bbdefb;
  --blob2: #e1bee7;
  --blob3: #c5cae9;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 4px; }

/* ========== BASE ========== */
html { height: 100%; font-size: 16px; }

body {
  min-height: 100vh;
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.65;
  overflow-x: hidden;
  transition: background 1.2s ease, color 0.4s ease;
  cursor: default;
}

/* ========== MOOD BODY CLASSES ========== */
body.mood-calm    { --blob1: #0d2137; --blob2: #0a3d62; --blob3: #0b4870; }
body.mood-stress  { --blob1: #2d0a1a; --blob2: #4a0e2e; --blob3: #1f0a0a; }
body.mood-positive{ --blob1: #0a2d1a; --blob2: #0d4735; --blob3: #0a2d2d; }
body.mood-mixed   { --blob1: #1a0d2d; --blob2: #2d1a0a; --blob3: #0a1a2d; }

/* ========== BACKGROUND LAYER ========== */
.bg-layer {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  pointer-events: none;
}

#particle-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0.6;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  transition: background 2s ease;
  animation: blobDrift 20s ease-in-out infinite;
}

.blob-1 {
  width: 600px; height: 600px;
  background: var(--blob1);
  top: -200px; left: -200px;
  animation-delay: 0s;
}
.blob-2 {
  width: 500px; height: 500px;
  background: var(--blob2);
  bottom: -150px; right: -150px;
  animation-delay: -7s;
}
.blob-3 {
  width: 400px; height: 400px;
  background: var(--blob3);
  top: 40%; left: 40%;
  animation-delay: -14s;
}

@keyframes blobDrift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33%       { transform: translate(40px, -30px) scale(1.05); }
  66%       { transform: translate(-30px, 40px) scale(0.95); }
}

/* ========== HEADER ========== */
.app-header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: rgba(5,8,16,0.3);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--c-border);
}

[data-theme="light"] .app-header {
  background: rgba(240,242,250,0.5);
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-weight: 700; font-size: 1.15rem;
  letter-spacing: -0.01em;
}

.logo-icon {
  font-size: 1.4rem;
  color: var(--c-accent);
  animation: spin 8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.header-controls {
  display: flex; align-items: center; gap: 8px;
}

.ctrl-btn {
  width: 38px; height: 38px;
  border: 1px solid var(--c-border);
  background: var(--c-surface);
  color: var(--c-text);
  border-radius: 10px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  backdrop-filter: blur(10px);
}
.ctrl-btn:hover { background: var(--c-surface-hover); border-color: var(--c-accent); color: var(--c-accent); }

.icon-moon { display: none; }
[data-theme="light"] .icon-sun { display: none; }
[data-theme="light"] .icon-moon { display: inline; }

.sound-btn.active { color: var(--c-calm); border-color: var(--c-calm); background: rgba(79,195,247,0.1); }

/* ========== SCREENS ========== */
.screen {
  position: fixed; inset: 0;
  display: flex;
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo);
  transform: scale(0.97);
  z-index: 10;
  padding-top: 72px;
}

.screen.active {
  opacity: 1; pointer-events: all; transform: scale(1);
}

/* ========== INPUT SCREEN ========== */
.screen-input {
  align-items: center; justify-content: center;
  padding: 72px 24px 24px;
}

.input-hero {
  width: 100%; max-width: 680px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  gap: 0;
}

.hero-eyebrow {
  font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--c-accent);
  margin-bottom: 14px;
  opacity: 0;
  animation: fadeUp 0.8s 0.1s var(--ease-out-expo) forwards;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 6vw, 4.2rem);
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -0.03em;
  margin-bottom: 14px;
  opacity: 0;
  animation: fadeUp 0.8s 0.2s var(--ease-out-expo) forwards;
}

.hero-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--c-accent), var(--c-calm));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  color: var(--c-text-dim);
  font-size: 0.97rem;
  margin-bottom: 36px;
  opacity: 0;
  animation: fadeUp 0.8s 0.3s var(--ease-out-expo) forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ========== INPUT CONTAINER ========== */
.input-container {
  width: 100%;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-card);
  backdrop-filter: blur(20px);
  overflow: hidden;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  opacity: 0;
  animation: fadeUp 0.8s 0.4s var(--ease-out-expo) forwards;
}

.input-container:focus-within {
  border-color: rgba(123,140,255,0.35);
  box-shadow: 0 0 40px rgba(123,140,255,0.1), 0 0 0 1px rgba(123,140,255,0.08);
}

textarea {
  width: 100%; min-height: 140px;
  background: transparent; border: none; outline: none; resize: none;
  padding: 24px 24px 8px;
  color: var(--c-text);
  font-family: var(--font-body);
  font-size: 1.05rem; font-weight: 300;
  line-height: 1.7;
}

textarea::placeholder { color: var(--c-text-faint); }

.input-meta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 24px 12px;
  font-size: 0.75rem; color: var(--c-text-faint);
}

.typing-indicator { display: flex; gap: 4px; align-items: center; }
.typing-indicator span {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--c-accent);
  opacity: 0;
  animation: typingDot 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

.typing-indicator.active span { opacity: 1; }

@keyframes typingDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
  30%            { transform: translateY(-4px); opacity: 1; }
}

.analyze-btn {
  width: 100%;
  padding: 16px 24px;
  background: linear-gradient(135deg, var(--c-accent), #9c6dff);
  border: none; color: white;
  font-family: var(--font-display); font-size: 0.95rem; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.3s ease;
  position: relative; overflow: hidden;
}

.analyze-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #9c6dff, var(--c-accent));
  opacity: 0; transition: opacity 0.3s;
}
.analyze-btn:hover::before { opacity: 1; }
.analyze-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.analyze-btn:not(:disabled):hover { box-shadow: 0 8px 30px rgba(123,140,255,0.4); transform: translateY(-1px); }
.analyze-btn:not(:disabled):active { transform: translateY(0); }

.btn-icon { font-size: 1.2rem; position: relative; transition: transform 0.3s ease; }
.analyze-btn:hover .btn-icon { transform: translateX(4px); }
.btn-text { position: relative; }

/* ========== TIMELINE ========== */
.timeline-section {
  width: 100%; margin-top: 32px;
  opacity: 0;
  animation: fadeUp 0.8s 0.6s var(--ease-out-expo) forwards;
}
.timeline-label {
  font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--c-text-faint); margin-bottom: 12px;
}
.timeline-bubbles { display: flex; gap: 10px; flex-wrap: wrap; }

.timeline-bubble {
  padding: 7px 14px;
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: 20px; font-size: 0.78rem; color: var(--c-text-dim);
  cursor: pointer; backdrop-filter: blur(10px);
  transition: all 0.2s ease;
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.timeline-bubble:hover { background: var(--c-surface-hover); color: var(--c-text); border-color: var(--c-accent); }

/* ========== VIZ SCREEN ========== */
.screen-viz {
  display: grid; grid-template-columns: 1fr 360px;
  gap: 0; overflow: hidden;
}

@media (max-width: 900px) {
  .screen-viz { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
}

.viz-panel {
  position: relative; display: flex; flex-direction: column;
  overflow: hidden;
}

.viz-toolbar {
  position: absolute; top: 16px; left: 16px;
  z-index: 20; display: flex; gap: 10px;
}

.back-btn, .deep-btn {
  padding: 8px 16px;
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: 10px; color: var(--c-text); font-size: 0.82rem;
  cursor: pointer; backdrop-filter: blur(20px);
  transition: all 0.2s ease; font-family: var(--font-body);
}
.back-btn:hover { border-color: var(--c-text-dim); }
.deep-btn { color: var(--c-accent); border-color: rgba(123,140,255,0.3); }
.deep-btn:hover { background: rgba(123,140,255,0.1); box-shadow: 0 0 20px rgba(123,140,255,0.2); }
.deep-btn.active { background: rgba(123,140,255,0.15); border-color: var(--c-accent); }

#brain-canvas {
  width: 100%; height: 100%; display: block;
  cursor: crosshair;
}

.canvas-hint {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--c-text-faint);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }

/* ========== INSIGHT PANEL ========== */
.insight-panel {
  height: 100%; overflow-y: auto;
  padding: 100px 28px 28px;
  border-left: 1px solid var(--c-border);
  display: flex; flex-direction: column; gap: 28px;
  position: relative;
}

.glass {
  background: var(--c-surface);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
}

/* ========== SCORE RING ========== */
.insight-score { display: flex; justify-content: center; }

.score-ring {
  width: 120px; height: 120px; position: relative;
}

.ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }

.ring-bg {
  fill: none; stroke: var(--c-border);
  stroke-width: 6;
}

.ring-fill {
  fill: none;
  stroke: url(#scoreGrad);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 327;
  stroke-dashoffset: 327;
  transition: stroke-dashoffset 1.5s var(--ease-out-expo);
}

.score-value {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
}

.score-value span {
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 700;
  line-height: 1;
}

.score-value small {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--c-text-dim);
  margin-top: 3px;
}

/* ========== MOOD SUMMARY ========== */
.mood-summary {}
.mood-summary h3 {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 700;
  letter-spacing: -0.02em; margin-bottom: 6px;
}
.mood-sub { font-size: 0.85rem; color: var(--c-text-dim); line-height: 1.5; }

/* ========== EMOTION BARS ========== */
.emotion-bars { display: flex; flex-direction: column; gap: 10px; }

.emotion-bar-item {}
.emotion-bar-label {
  display: flex; justify-content: space-between;
  font-size: 0.75rem; margin-bottom: 5px;
  color: var(--c-text-dim); text-transform: capitalize;
}
.emotion-bar-track {
  height: 5px; background: var(--c-border); border-radius: 3px; overflow: hidden;
}
.emotion-bar-fill {
  height: 100%; border-radius: 3px;
  width: 0; transition: width 1.2s var(--ease-out-expo);
}

/* ========== REFLECTION ========== */
.reflection-section { display: flex; flex-direction: column; gap: 10px; }
.reflection-label {
  font-size: 0.72rem; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--c-text-faint);
}
.reflections { display: flex; flex-direction: column; gap: 8px; }
.reflection-card {
  padding: 12px 15px;
  background: var(--c-surface-hover);
  border: 1px solid var(--c-border);
  border-left: 3px solid var(--c-accent);
  border-radius: 10px;
  font-size: 0.83rem; color: var(--c-text-dim);
  line-height: 1.5;
  animation: fadeUp 0.5s var(--ease-out-expo) forwards;
}

.subtle-btn {
  background: none; border: 1px solid var(--c-border);
  border-radius: 8px; padding: 8px 14px;
  color: var(--c-text-dim); font-size: 0.78rem; cursor: pointer;
  transition: all 0.2s ease; font-family: var(--font-body);
  text-align: left;
}
.subtle-btn:hover { border-color: var(--c-text-dim); color: var(--c-text); }

/* ========== NODE DETAIL ========== */
.node-detail {
  position: absolute;
  bottom: 28px; left: 28px; right: 28px;
  padding: 20px;
  border: 1px solid var(--c-accent);
  border-radius: var(--r-card);
  background: var(--c-surface);
  backdrop-filter: blur(30px);
  transition: all 0.4s var(--ease-out-expo);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.node-detail.hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }
.close-detail {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: var(--c-text-dim);
  font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
  border-radius: 6px; transition: color 0.2s;
}
.close-detail:hover { color: var(--c-text); }

.node-detail-tag {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--c-accent); margin-bottom: 6px;
}
.node-detail-text {
  font-size: 0.88rem; margin-bottom: 10px; line-height: 1.5;
}
.node-detail-insight {
  font-size: 0.8rem; color: var(--c-text-dim); line-height: 1.55;
  font-style: italic; border-top: 1px solid var(--c-border); padding-top: 10px;
}

/* ========== NODE TOOLTIP ========== */
.node-tooltip {
  position: fixed; z-index: 200;
  padding: 8px 12px;
  background: rgba(5,8,16,0.9);
  border: 1px solid var(--c-border);
  border-radius: 8px; font-size: 0.78rem;
  max-width: 200px; line-height: 1.4;
  pointer-events: none;
  opacity: 0; transform: translateY(4px);
  transition: opacity 0.2s, transform 0.2s;
  backdrop-filter: blur(20px);
}
.node-tooltip.visible { opacity: 1; transform: translateY(0); }

/* ========== PULSE OVERLAY ========== */
.pulse-overlay {
  position: fixed; inset: 0; z-index: 5;
  pointer-events: none; opacity: 0;
  animation: emotionPulse 4s ease-in-out infinite;
  background: radial-gradient(ellipse at center, transparent 60%, var(--pulse-color, rgba(123,140,255,0.08)) 100%);
}

@keyframes emotionPulse {
  0%,100% { opacity: 0; }
  50%      { opacity: 1; }
}

/* ========== SVG DEFS (hidden) ========== */
svg.defs-only { position: absolute; width: 0; height: 0; overflow: hidden; }

/* ========== RESPONSIVE ========== */
@media (max-width: 900px) {
  .screen-viz { grid-template-columns: 1fr; }
  .insight-panel {
    height: 320px; border-left: none; border-top: 1px solid var(--c-border);
    padding: 20px; overflow-x: hidden;
    flex-direction: row; flex-wrap: wrap; gap: 16px;
  }
  .insight-score { order: -1; }
  .node-detail { position: relative; bottom: auto; left: auto; right: auto; margin-top: 10px; }
}

@media (max-width: 600px) {
  .app-header { padding: 12px 16px; }
  .hero-title { font-size: 2.2rem; }
  .insight-panel { flex-direction: column; height: auto; }
  .viz-toolbar { top: 8px; left: 8px; }
}

/* ========== LOADING STATE ========== */
.analyze-btn.loading .btn-text::after {
  content: ''; display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-left: 8px; vertical-align: middle;
}
  </style>
</head>
<body class="mood-neutral" data-theme="dark">

  <div id="bg-layer" class="bg-layer">
    <canvas id="particle-canvas"></canvas>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="app-header">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">MindMirror</span>
    </div>
    <nav class="header-controls">
      <button id="btn-theme" class="ctrl-btn" title="Toggle theme">
        <span class="icon-sun">☀</span><span class="icon-moon">◑</span>
      </button>
      <button id="btn-sound" class="ctrl-btn sound-btn" title="Ambient sound">
        <span>♫</span>
      </button>
      <button id="btn-export" class="ctrl-btn" title="Export mind map" style="display:none">
        <span>↓</span>
      </button>
    </nav>
  </header>

  <main id="screen-input" class="screen screen-input active">
    <div class="input-hero">
      <p class="hero-eyebrow">Your thoughts, visualized</p>
      <h1 class="hero-title">What's on your<br/><em>mind</em> right now?</h1>
      <p class="hero-sub">Type anything. We'll map the patterns beneath.</p>

      <div class="input-container">
        <textarea
          id="thought-input"
          placeholder="Type what's on your mind… fears, hopes, plans, feelings. There's no wrong answer."
          rows="5"
          maxlength="2000"
        ></textarea>
        <div class="input-meta">
          <span id="char-count">0 / 2000</span>
          <div class="typing-indicator" id="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
        <button id="btn-analyze" class="analyze-btn" disabled>
          <span class="btn-text">Analyze Mind</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <div class="timeline-section" id="timeline-section" style="display:none">
        <p class="timeline-label">Previous sessions</p>

  <script>
/* ============================================
   MindMirror — analysisEngine.js
   Simulated AI text analysis with sentiment,
   keyword detection, and categorization
============================================ */

const AnalysisEngine = (() => {

  // ——— Keyword dictionaries ———
  const KEYWORDS = {
    stress: [
      'anxious','anxiety','stressed','stress','worried','worry','overwhelmed',
      'deadline','pressure','panic','nervous','fear','scared','exhausted',
      'burnout','tired','frustrated','angry','upset','tense','dread','dreadful',
      'hate','struggling','struggle','difficult','hard','too much','can\'t',
      'cannot','fail','failure','lost','hopeless','worthless','afraid','terrified',
      'nightmare','disaster','crisis','problem','issue','stuck','trapped'
    ],
    positive: [
      'happy','happiness','excited','exciting','joy','joyful','love','loving',
      'grateful','gratitude','amazing','wonderful','great','fantastic','awesome',
      'proud','pride','hopeful','hope','optimistic','inspired','motivation',
      'motivated','blessed','thankful','peaceful','calm','content','satisfied',
      'accomplished','success','winning','thrilled','elated','ecstatic','delight',
      'delighted','euphoric','radiant','vibrant','energized','passionate'
    ],
    goals: [
      'goal','goals','plan','planning','future','dream','dreams','achieve',
      'achievement','ambition','ambitious','want to','need to','going to',
      'will','build','create','start','begin','launch','grow','improve',
      'learn','study','practice','work on','project','career','business',
      'relationship','health','fitness','travel','save','invest','change',
      'transform','become','vision','mission','purpose','why','progress'
    ],
    negative: [
      'sad','sadness','depressed','depression','lonely','alone','grief','loss',
      'regret','regrets','miss','missing','hurt','pain','broken','empty',
      'numb','disappointed','disappointment','shame','guilty','guilt','betrayed',
      'abandoned','rejected','unloved','worthless','meaningless','pointless',
      'dark','darkness','void','hollow','ache','crying','tears','sorrow'
    ]
  };

  // ——— Insight generators ———
  const INSIGHTS = {
    stress: [
      'This thought carries tension. What specific part feels most urgent?',
      'Stress often points to something we deeply care about.',
      'Breaking this into smaller pieces might reduce the weight.',
      'Is this anxiety about what *is* or what *might* be?',
      'What would it feel like if this resolved perfectly?'
    ],
    positive: [
      'Notice this joy — it reveals what truly matters to you.',
      'Positive energy is a signal, not just a feeling. What does it point to?',
      'This brightness in your mind is worth amplifying.',
      'What created this feeling, and can you invite more of it?',
      'Your nervous system recognizes safety here. Honor it.'
    ],
    goals: [
      'This ambition is your compass, not your burden.',
      'What's the smallest possible first step toward this?',
      'Goals held in mind start attracting what\'s needed.',
      'Who would you be if this were already achieved?',
      'The gap between here and there is just a series of small choices.'
    ],
    negative: [
      'Pain this specific means something real is being processed.',
      'Difficult emotions aren\'t obstacles — they\'re information.',
      'What does this feeling need you to acknowledge?',
      'Even the darkest thoughts are just thoughts — not truths.',
      'Sitting with discomfort, even briefly, is a form of courage.'
    ],
    neutral: [
      'Neutral thought space is where clarity often arrives.',
      'Not everything needs a category — some thoughts just exist.',
      'This observation reveals how your mind organizes the world.',
      'What connection might this have to something deeper?',
      'Curiosity about your own thoughts is a superpower.'
    ]
  };

  const REFLECTIONS = {
    stress: [
      'Why do you feel stressed about this specifically?',
      'Is this situation within your control?',
      'What is the worst realistic outcome, and could you survive it?',
      'Who in your life could share this weight with you?',
      'What would you tell a close friend feeling this way?'
    ],
    positive: [
      'What created this feeling of positivity?',
      'How can you protect and nurture this energy?',
      'Who else benefits when you feel this way?',
      'What does this moment reveal about your values?',
      'How might you carry this feeling into tomorrow?'
    ],
    goals: [
      'What would achieving this mean about who you are?',
      'What belief is stopping you from starting today?',
      'In 5 years, will this goal still matter to you?',
      'What are you willing to sacrifice to make this happen?',
      'Is this truly your goal, or someone else\'s vision for you?'
    ],
    negative: [
      'What is this feeling trying to protect you from?',
      'When did you last feel the opposite of this?',
      'What would you need to believe differently to feel lighter?',
      'What small act of self-kindness can you offer yourself now?',
      'Is this a permanent state or a passing weather pattern?'
    ],
    neutral: [
      'What is your mind gravitating toward today?',
      'What would you explore if you had no limitations?',
      'What question do you wish someone would ask you right now?',
      'What does your body know that your mind doesn\'t?',
      'If today had a theme, what would it be?'
    ]
  };

  const PHILOSOPHICAL_PROMPTS = [
    'What version of yourself would you want to meet in ten years?',
    'Which of your beliefs have you never actually examined?',
    'If your thoughts were visible to others, what would surprise them?',
    'What are you avoiding by staying busy?',
    'What has silence been trying to tell you lately?',
    'Which emotion do you trust least, and why?',
    'What would you do if success was guaranteed?',
    'Who were you before the world told you who to be?',
    'What does your future self most need you to do today?',
    'If your life was a story, what chapter are you in?',
    'What small truth have you been ignoring?',
    'What would wholeness feel like for you right now?',
    'Which of your habits are speaking louder than your words?',
    'What are you ready to let go of, even though it\'s comfortable?',
    'What does your ideal ordinary Tuesday look like?'
  ];

  const MOOD_HEADLINES = {
    stress:   ['Mind Under Pressure', 'Tension Detected', 'High-Alert State', 'Carrying Weight'],
    positive: ['Radiant Headspace', 'Bright Inner World', 'Flourishing State', 'Light Within'],
    goals:    ['Forward-Focused Mind', 'Visionary State', 'Ambition in Motion', 'Builder\'s Mind'],
    negative: ['Processing Depth', 'Inner Turbulence', 'Heavy Weather', 'Tender Space'],
    neutral:  ['Clear Observation', 'Curious Mind', 'Open Field', 'Floating State'],
    mixed:    ['Complex Landscape', 'Multidimensional Mind', 'Rich Inner World', 'Layered State']
  };

  // ——— Core analysis function ———
  function analyze(text) {
    const lower = text.toLowerCase();
    const words = lower.split(/\s+/);
    const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);

    const scores = { stress: 0, positive: 0, goals: 0, negative: 0, neutral: 0 };

    // Count keyword hits
    for (const [cat, kws] of Object.entries(KEYWORDS)) {
      for (const kw of kws) {
        if (lower.includes(kw)) {
          scores[cat] += kw.split(' ').length > 1 ? 3 : 1;
        }
      }
    }

    // Detect question marks (curiosity/neutral boost)
    const questionCount = (text.match(/\?/g) || []).length;
    scores.neutral += questionCount;

    // Exclamation intensity boost
    const exclCount = (text.match(/!/g) || []).length;
    if (scores.positive > scores.stress) scores.positive += exclCount;
    else scores.stress += exclCount;

    // Uppercase words → stress indicator
    const capsWords = (text.match(/\b[A-Z]{2,}\b/g) || []).length;
    scores.stress += capsWords;

    // Word count baseline neutral
    scores.neutral += Math.max(0, Math.floor(words.length / 15));

    // Normalize total to percentages
    const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
    const pct = {};
    for (const [k, v] of Object.entries(scores)) {
      pct[k] = Math.round((v / total) * 100);
    }

    // Ensure sum = 100
    const sum = Object.values(pct).reduce((a, b) => a + b, 0);
    pct.neutral += (100 - sum);

    // Dominant category
    const dominant = Object.entries(pct).reduce((a, b) => b[1] > a[1] ? b : a)[0];

    // Mind health score (0–100)
    const healthScore = Math.min(100, Math.max(10,
      50 + (pct.positive * 0.4) + (pct.goals * 0.3) - (pct.stress * 0.4) - (pct.negative * 0.5) + (pct.neutral * 0.1)
    ));

    // Extract thought fragments as nodes
    const fragments = extractFragments(text, sentences);

    // Pick mood based on scores
    let moodKey = dominant;
    if (pct.stress > 30 && pct.positive > 25) moodKey = 'mixed';

    return {
      text,
      scores: pct,
      dominant,
      moodKey,
      healthScore: Math.round(healthScore),
      fragments,
      headline: randomFrom(MOOD_HEADLINES[moodKey] || MOOD_HEADLINES.neutral),
      reflections: pickReflections(dominant, 3),
      timestamp: Date.now()
    };
  }

  function extractFragments(text, sentences) {
    const fragments = [];
    const lower = text.toLowerCase();

    // Add sentence-based nodes
    sentences.forEach((sentence, i) => {
      if (sentence.trim().length < 3) return;
      const sentLower = sentence.toLowerCase();
      let cat = 'neutral';
      let maxScore = 0;

      for (const [c, kws] of Object.entries(KEYWORDS)) {
        let score = 0;
        for (const kw of kws) {
          if (sentLower.includes(kw)) score++;
        }
        if (score > maxScore) { maxScore = score; cat = c; }
      }

      fragments.push({
        id: `node-${i}-${Date.now()}`,
        text: sentence.trim().slice(0, 80),
        category: cat,
        insight: randomFrom(INSIGHTS[cat]),
        size: 0.7 + Math.min(sentence.trim().length / 100, 0.5)
      });
    });

    // Add keyword-extracted concept nodes
    for (const [cat, kws] of Object.entries(KEYWORDS)) {
      const found = kws.filter(kw => lower.includes(kw));
      found.slice(0, 3).forEach((kw, i) => {
        if (fragments.length < 20) {
          fragments.push({
            id: `kw-${cat}-${i}-${Date.now()}`,
            text: kw,
            category: cat,
            insight: randomFrom(INSIGHTS[cat]),
            size: 0.4 + Math.random() * 0.3,
            isKeyword: true
          });
        }
      });
    }

    // Limit to 20 nodes
    return fragments.slice(0, 20);
  }

  function pickReflections(cat, count) {
    const pool = [...(REFLECTIONS[cat] || REFLECTIONS.neutral)];
    const picks = [];
    while (picks.length < count && pool.length > 0) {
      const idx = Math.floor(Math.random() * pool.length);
      picks.push(pool.splice(idx, 1)[0]);
    }
    return picks;
  }

  function randomPhilosophical() {
    return randomFrom(PHILOSOPHICAL_PROMPTS);
  }

  function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ——— Color map ———
  const COLORS = {
    stress:   { base: '#f06292', glow: 'rgba(240,98,146,0.5)',   dark: '#ad1457' },
    positive: { base: '#69f0ae', glow: 'rgba(105,240,174,0.5)',  dark: '#00695c' },
    goals:    { base: '#40c4ff', glow: 'rgba(64,196,255,0.5)',   dark: '#0277bd' },
    negative: { base: '#ef5350', glow: 'rgba(239,83,80,0.5)',    dark: '#b71c1c' },
    neutral:  { base: '#ffd54f', glow: 'rgba(255,213,79,0.5)',   dark: '#f57f17' }
  };

  return { analyze, randomPhilosophical, COLORS };
})();
/* ============================================
   MindMirror — visualization.js
   Canvas-based neural brain visualization
   with floating nodes, connections, animations
============================================ */

const Visualization = (() => {

  let canvas, ctx, W, H;
  let nodes = [], connections = [];
  let animFrame;
  let deepMode = false;
  let hoveredNode = null;
  let currentResult = null;

  // ——— Init ———
  function init(canvasEl) {
    canvas = canvasEl;
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('click', onCanvasClick);
    canvas.addEventListener('mouseleave', () => {
      hoveredNode = null;
      UIController.hideTooltip();
    });
  }

  function resize() {
    if (!canvas) return;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = rect.width  * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    canvas.style.width  = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(devicePixelRatio, devicePixelRatio);
    W = rect.width;
    H = rect.height;

    // Reposition nodes after resize
    nodes.forEach(n => {
      n.x = Math.max(n.r, Math.min(W - n.r, n.x));
      n.y = Math.max(n.r, Math.min(H - n.r, n.y));
    });
  }

  // ——— Build from analysis result ———
  function build(result) {
    currentResult = result;
    nodes = [];
    connections = [];
    if (animFrame) cancelAnimationFrame(animFrame);

    const fragments = result.fragments;
    const cx = W / 2, cy = H / 2;

    fragments.forEach((frag, i) => {
      const angle = (i / fragments.length) * Math.PI * 2 - Math.PI / 2;
      const dist  = 80 + Math.random() * Math.min(W, H) * 0.25;
      const col   = AnalysisEngine.COLORS[frag.category];

      nodes.push({
        id: frag.id,
        text: frag.text,
        category: frag.category,
        insight: frag.insight,
        isKeyword: frag.isKeyword || false,
        color: col.base,
        glow:  col.glow,
        // Physics
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r:  (frag.size || 0.6) * 28,
        // Animation
        scale: 0, targetScale: 1,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 0.02 + Math.random() * 0.02,
        spawnDelay: i * 80,
        born: Date.now()
      });
    });

    // Build connections (nearby nodes)
    buildConnections();

    // Start loop
    loop();
  }

  function buildConnections() {
    connections = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200) {
          connections.push({ a, b, opacity: 0, targetOpacity: 0.3 + Math.random() * 0.2, born: Date.now() + Math.random() * 500 });
        }
      }
    }
  }

  // ——— Deep mode: add more nodes ———
  function enableDeep() {
    deepMode = true;
    const deepInsights = [
      'subconscious pattern', 'hidden belief', 'core memory', 'shadow thought',
      'suppressed desire', 'inner voice', 'somatic echo', 'implicit bias',
      'childhood echo', 'future self', 'fear beneath fear', 'unexpressed need'
    ];

    const cx = W / 2, cy = H / 2;
    const cats = ['stress','positive','goals','negative','neutral'];

    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist  = 40 + Math.random() * Math.min(W, H) * 0.35;
      const cat   = cats[Math.floor(Math.random() * cats.length)];
      const col   = AnalysisEngine.COLORS[cat];
      const label = deepInsights[Math.floor(Math.random() * deepInsights.length)];

      nodes.push({
        id: `deep-${i}-${Date.now()}`,
        text: label,
        category: cat,
        insight: 'A deeper layer of your mind — patterns that operate beneath conscious awareness.',
        isKeyword: true,
        color: col.base,
        glow: col.glow,
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: 14 + Math.random() * 14,
        scale: 0, targetScale: 1,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 0.025 + Math.random() * 0.025,
        spawnDelay: i * 120,
        born: Date.now(),
        isDeep: true
      });
    }

    buildConnections();
  }

  function disableDeep() {
    deepMode = false;
    nodes = nodes.filter(n => !n.isDeep);
    buildConnections();
  }

  // ——— Main loop ———
  function loop() {
    ctx.clearRect(0, 0, W, H);

    const now = Date.now();

    // Draw connections
    drawConnections(now);

    // Draw central cluster glow
    drawCenterGlow();

    // Update & draw nodes
    nodes.forEach(n => updateNode(n, now));
    nodes.forEach(n => drawNode(n));

    animFrame = requestAnimationFrame(loop);
  }

  function drawConnections(now) {
    connections.forEach(conn => {
      if (now < conn.born) return;

      // Fade in
      if (conn.opacity < conn.targetOpacity) {
        conn.opacity = Math.min(conn.targetOpacity, conn.opacity + 0.004);
      }

      const ax = conn.a.x, ay = conn.a.y;
      const bx = conn.b.x, by = conn.b.y;

      const grad = ctx.createLinearGradient(ax, ay, bx, by);
      grad.addColorStop(0, conn.a.color + hexAlpha(conn.opacity * conn.a.scale));
      grad.addColorStop(1, conn.b.color + hexAlpha(conn.opacity * conn.b.scale));

      ctx.beginPath();
      ctx.strokeStyle = grad;
      ctx.lineWidth = 0.8;
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.stroke();

      // Animated pulse dot along connection
      const t = (now % 3000) / 3000;
      const px = ax + (bx - ax) * t;
      const py = ay + (by - ay) * t;
      ctx.beginPath();
      ctx.fillStyle = conn.a.color + '60';
      ctx.arc(px, py, 1.5, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawCenterGlow() {
    if (!currentResult) return;
    const col = AnalysisEngine.COLORS[currentResult.dominant];
    const cx = W / 2, cy = H / 2;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 120);
    grad.addColorStop(0, col.glow);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.fillStyle = grad;
    ctx.arc(cx, cy, 120, 0, Math.PI * 2);
    ctx.fill();
  }

  function updateNode(n, now) {
    // Spawn delay
    if (now < n.born + n.spawnDelay) return;

    // Scale in
    if (n.scale < n.targetScale) {
      n.scale = Math.min(n.targetScale, n.scale + 0.04);
    }

    // Float physics
    n.pulse += n.pulseSpeed;
    n.x += n.vx + Math.sin(n.pulse * 0.7) * 0.15;
    n.y += n.vy + Math.cos(n.pulse * 0.9) * 0.12;

    // Gentle center attraction
    const cx = W / 2, cy = H / 2;
    const dx = cx - n.x, dy = cy - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 20) {
      n.vx += (dx / dist) * 0.015;
      n.vy += (dy / dist) * 0.015;
    }

    // Damping
    n.vx *= 0.97;
    n.vy *= 0.97;

    // Bounce off edges
    const pad = n.r + 20;
    if (n.x < pad) { n.vx += 0.3; }
    if (n.x > W - pad) { n.vx -= 0.3; }
    if (n.y < pad + 60) { n.vy += 0.3; }
    if (n.y > H - pad) { n.vy -= 0.3; }

    // Node repulsion
    nodes.forEach(other => {
      if (other === n) return;
      const ox = n.x - other.x, oy = n.y - other.y;
      const d = Math.sqrt(ox * ox + oy * oy);
      const minD = n.r + other.r + 10;
      if (d < minD && d > 0) {
        const force = (minD - d) / minD * 0.5;
        n.vx += (ox / d) * force;
        n.vy += (oy / d) * force;
      }
    });
  }

  function drawNode(n) {
    if (n.scale < 0.01) return;

    const now = Date.now();
    if (now < n.born + n.spawnDelay) return;

    ctx.save();
    ctx.translate(n.x, n.y);

    const isHovered = hoveredNode === n;
    const scl = n.scale * (isHovered ? 1.12 : 1);
    const pulseR = n.r * scl * (1 + Math.sin(n.pulse) * 0.06);

    // Outer glow
    const glowSize = pulseR * (isHovered ? 2.2 : 1.6);
    const gGlow = ctx.createRadialGradient(0, 0, pulseR * 0.5, 0, 0, glowSize);
    gGlow.addColorStop(0, n.glow);
    gGlow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.fillStyle = gGlow;
    ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
    ctx.fill();

    // Node body
    const gBody = ctx.createRadialGradient(-pulseR * 0.3, -pulseR * 0.3, 0, 0, 0, pulseR);
    gBody.addColorStop(0, lighten(n.color, 0.3));
    gBody.addColorStop(1, n.color);
    ctx.beginPath();
    ctx.fillStyle = gBody;
    ctx.arc(0, 0, pulseR, 0, Math.PI * 2);
    ctx.fill();

    // Border ring
    ctx.beginPath();
    ctx.strokeStyle = isHovered ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.arc(0, 0, pulseR, 0, Math.PI * 2);
    ctx.stroke();

    // Inner dot for keywords
    if (n.isKeyword && pulseR < 20) {
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.arc(0, 0, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Label for larger nodes
    if (pulseR > 18 && !n.isKeyword) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = `${Math.max(9, Math.min(12, pulseR * 0.4))}px 'DM Sans', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const maxW = pulseR * 1.6;
      const shortText = n.text.length > 20 ? n.text.slice(0, 18) + '…' : n.text;
      ctx.fillText(shortText, 0, 0, maxW);
    }

    ctx.restore();
  }

  // ——— Mouse interaction ———
  function onMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    hoveredNode = null;
    for (const n of nodes) {
      const dx = mx - n.x, dy = my - n.y;
      if (Math.sqrt(dx*dx + dy*dy) < n.r * n.scale * 1.2) {
        hoveredNode = n;
        break;
      }
    }

    if (hoveredNode) {
      canvas.style.cursor = 'pointer';
      UIController.showTooltip(hoveredNode.text, e.clientX, e.clientY);
    } else {
      canvas.style.cursor = 'crosshair';
      UIController.hideTooltip();
    }
  }

  function onCanvasClick(e) {
    if (hoveredNode) {
      UIController.showNodeDetail(hoveredNode);
    }
  }

  // ——— Export ———
  function exportImage() {
    const link = document.createElement('a');
    link.download = 'mindmirror-map.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // ——— Particle canvas for input screen ———
  function initParticles() {
    const pc = document.getElementById('particle-canvas');
    const pCtx = pc.getContext('2d');
    const particles = [];
    let mouseX = -1000, mouseY = -1000;

    function resizeParticle() {
      pc.width  = window.innerWidth  * devicePixelRatio;
      pc.height = window.innerHeight * devicePixelRatio;
      pc.style.width  = window.innerWidth + 'px';
      pc.style.height = window.innerHeight + 'px';
      pCtx.scale(devicePixelRatio, devicePixelRatio);
    }

    resizeParticle();
    window.addEventListener('resize', resizeParticle);

    // Spawn subtle particles
    for (let i = 0; i < 60; i++) {
      particles.push(spawnParticle(window.innerWidth, window.innerHeight, true));
    }

    function spawnParticle(W, H, random) {
      return {
        x: random ? Math.random() * W : mouseX + (Math.random() - 0.5) * 80,
        y: random ? Math.random() * H : mouseY + (Math.random() - 0.5) * 80,
        vx: (Math.random() - 0.5) * 0.4,
        vy: -(0.2 + Math.random() * 0.4),
        r: 1 + Math.random() * 2,
        opacity: 0.1 + Math.random() * 0.3,
        life: 1, decay: 0.002 + Math.random() * 0.003,
        color: ['#7b8cff','#4fc3f7','#69f0ae','#ffd54f'][Math.floor(Math.random() * 4)]
      };
    }

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
    });

    let typing = false;
    document.getElementById('thought-input').addEventListener('input', () => {
      typing = true;
      setTimeout(() => typing = false, 100);
    });

    function particleLoop() {
      const W = window.innerWidth, H = window.innerHeight;
      pCtx.clearRect(0, 0, W, H);

      // Spawn from mouse occasionally
      if (Math.random() < 0.15 || typing) {
        particles.push(spawnParticle(W, H, false));
      }

      particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        p.opacity = p.life * 0.3;

        if (p.life <= 0) {
          particles[i] = spawnParticle(W, H, true);
          return;
        }

        pCtx.beginPath();
        pCtx.fillStyle = p.color;
        pCtx.globalAlpha = p.opacity;
        pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pCtx.fill();
        pCtx.globalAlpha = 1;
      });

      requestAnimationFrame(particleLoop);
    }

    particleLoop();
  }

  // ——— Helpers ———
  function hexAlpha(opacity) {
    return Math.round(Math.max(0, Math.min(255, opacity * 255))).toString(16).padStart(2, '0');
  }

  function lighten(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    let r = Math.min(255, (num >> 16) + Math.round(amount * 255));
    let g = Math.min(255, ((num >> 8) & 0xff) + Math.round(amount * 255));
    let b = Math.min(255, (num & 0xff) + Math.round(amount * 255));
    return `rgb(${r},${g},${b})`;
  }

  function stop() {
    if (animFrame) cancelAnimationFrame(animFrame);
  }

  return { init, build, stop, exportImage, initParticles, enableDeep, disableDeep };
})();
/* ============================================
   MindMirror — uiController.js
   Manages screens, state, interactions,
   sound, timeline, and all UI transitions
============================================ */

const UIController = (() => {

  // ——— State ———
  let history = JSON.parse(localStorage.getItem('mm_history') || '[]');
  let currentResult = null;
  let soundEnabled = false;
  let audioCtx = null;
  let deepModeOn = false;
  let typingTimer = null;
  let pulseTimeout = null;

  // ——— DOM refs ———
  const $  = id => document.getElementById(id);
  const $$ = sel => document.querySelectorAll(sel);

  const els = {};

  // ——— Boot ———
  function init() {
    // Gather DOM
    els.screenInput  = $('screen-input');
    els.screenViz    = $('screen-viz');
    els.input        = $('thought-input');
    els.charCount    = $('char-count');
    els.typingInd    = $('typing-indicator');
    els.btnAnalyze   = $('btn-analyze');
    els.btnBack      = $('btn-back');
    els.btnDeep      = $('btn-deep');
    els.btnTheme     = $('btn-theme');
    els.btnSound     = $('btn-sound');
    els.btnExport    = $('btn-export');
    els.btnReflect   = $('btn-random-reflect');
    els.brainCanvas  = $('brain-canvas');
    els.tooltip      = $('node-tooltip');
    els.nodeDetail   = $('node-detail');
    els.nodeDetailTag  = $('node-detail-tag');
    els.nodeDetailText = $('node-detail-text');
    els.nodeDetailInsight = $('node-detail-insight');
    els.closeDetail  = $('close-detail');
    els.pulseOverlay = $('pulse-overlay');
    els.ringFill     = $('ring-fill');
    els.scoreNumber  = $('score-number');
    els.moodHeadline = $('mood-headline');
    els.moodSub      = $('mood-sub');
    els.emotionBars  = $('emotion-bars');
    els.reflections  = $('reflections');
    els.timelineSection = $('timeline-section');
    els.timelineBubbles = $('timeline-bubbles');

    // Inject SVG gradient defs
    injectSVGDefs();

    // Init canvas visualization
    Visualization.init(els.brainCanvas);
    Visualization.initParticles();

    // Events
    els.input.addEventListener('input', onInputChange);
    els.btnAnalyze.addEventListener('click', onAnalyze);
    els.btnBack.addEventListener('click', goToInput);
    els.btnDeep.addEventListener('click', toggleDeep);
    els.btnTheme.addEventListener('click', toggleTheme);
    els.btnSound.addEventListener('click', toggleSound);
    els.btnExport.addEventListener('click', () => Visualization.exportImage());
    els.btnReflect.addEventListener('click', generateRandomReflect);
    els.closeDetail.addEventListener('click', () => els.nodeDetail.classList.add('hidden'));

    // Load history
    renderTimeline();

    // Keyboard shortcut: Enter to analyze
    els.input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.metaKey) onAnalyze();
    });
  }

  // ——— Input handling ———
  function onInputChange() {
    const val = els.input.value;
    els.charCount.textContent = `${val.length} / 2000`;
    els.btnAnalyze.disabled = val.trim().length < 5;

    // Typing indicator
    els.typingInd.classList.add('active');
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      els.typingInd.classList.remove('active');
    }, 1000);
  }

  // ——— Analyze ———
  async function onAnalyze() {
    const text = els.input.value.trim();
    if (text.length < 5) return;

    // Loading state
    els.btnAnalyze.classList.add('loading');
    els.btnAnalyze.disabled = true;

    // Simulate processing delay
    await delay(900);

    currentResult = AnalysisEngine.analyze(text);

    // Save to history
    history.unshift(currentResult);
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem('mm_history', JSON.stringify(history));

    // Transition to viz screen
    await transitionToViz(currentResult);

    els.btnAnalyze.classList.remove('loading');
    els.btnAnalyze.disabled = false;
  }

  async function transitionToViz(result) {
    // Show viz screen
    els.screenInput.classList.remove('active');
    await delay(100);
    els.screenViz.classList.add('active');
    els.btnExport.style.display = 'flex';

    // Set mood theme
    setMood(result.moodKey);

    // Build brain visualization
    Visualization.build(result);

    // Populate insight panel
    await delay(300);
    populateInsightPanel(result);

    // Trigger emotion pulse
    triggerEmotionPulse(result.dominant);

    // Render timeline
    renderTimeline();
  }

  function goToInput() {
    Visualization.stop();
    deepModeOn = false;
    els.btnDeep.classList.remove('active');
    els.screenViz.classList.remove('active');
    els.btnExport.style.display = 'none';

    setTimeout(() => {
      els.screenInput.classList.add('active');
    }, 100);
  }

  // ——— Insight Panel ———
  function populateInsightPanel(result) {
    // Animate score ring
    animateScore(result.healthScore);

    // Headline
    els.moodHeadline.textContent = result.headline;

    // Subtitle
    const moodDescs = {
      stress:   'Your mind is carrying weight. These patterns deserve attention.',
      positive: 'A luminous inner state. Your thoughts radiate constructive energy.',
      goals:    'Ambition and forward-thinking dominate your mental landscape.',
      negative: 'Deep feelings are surfacing. This takes courage to acknowledge.',
      neutral:  'A clear, observational state. Your mind is watching and processing.',
      mixed:    'A rich complexity of emotions and ideas coexist in your mind.'
    };
    els.moodSub.textContent = moodDescs[result.moodKey] || moodDescs.neutral;

    // Emotion bars
    els.emotionBars.innerHTML = '';
    const catColors = {
      stress: '#f06292', positive: '#69f0ae',
      goals: '#40c4ff', negative: '#ef5350', neutral: '#ffd54f'
    };

    Object.entries(result.scores)
      .sort((a, b) => b[1] - a[1])
      .forEach(([cat, pct]) => {
        if (pct === 0) return;
        const item = document.createElement('div');
        item.className = 'emotion-bar-item';
        item.innerHTML = `
          <div class="emotion-bar-label">
            <span>${cat}</span><span>${pct}%</span>
          </div>
          <div class="emotion-bar-track">
            <div class="emotion-bar-fill" style="background:${catColors[cat]}" data-pct="${pct}"></div>
          </div>
        `;
        els.emotionBars.appendChild(item);
      });

    // Animate bars
    setTimeout(() => {
      $$('.emotion-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.pct + '%';
      });
    }, 100);

    // Reflection prompts
    renderReflections(result.reflections);
  }

  function renderReflections(prompts) {
    els.reflections.innerHTML = '';
    prompts.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'reflection-card';
      card.textContent = p;
      card.style.animationDelay = `${i * 0.1}s`;
      card.style.opacity = '0';
      els.reflections.appendChild(card);
      // Trigger animation
      setTimeout(() => { card.style.opacity = '1'; }, i * 100);
    });
  }

  function generateRandomReflect() {
    const prompt = AnalysisEngine.randomPhilosophical();
    const card = document.createElement('div');
    card.className = 'reflection-card';
    card.textContent = prompt;
    card.style.borderColor = 'rgba(255,213,79,0.5)';
    card.style.opacity = '0';
    card.style.transform = 'translateY(8px)';
    card.style.transition = 'all 0.4s ease';
    els.reflections.prepend(card);
    setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 10);

    // Remove after 6 seconds
    setTimeout(() => {
      card.style.opacity = '0';
      setTimeout(() => card.remove(), 400);
    }, 6000);
  }

  function animateScore(score) {
    const circumference = 327;
    const offset = circumference - (score / 100) * circumference;

    els.scoreNumber.textContent = '0';
    els.ringFill.style.strokeDashoffset = circumference;

    setTimeout(() => {
      els.ringFill.style.strokeDashoffset = offset;

      // Animate number
      let current = 0;
      const step = score / 60;
      const counter = setInterval(() => {
        current = Math.min(score, current + step);
        els.scoreNumber.textContent = Math.round(current);
        if (current >= score) clearInterval(counter);
      }, 25);
    }, 300);
  }

  // ——— Node Detail ———
  function showNodeDetail(node) {
    const catLabels = {
      stress: '⚡ Stress Thought',
      positive: '✦ Positive Energy',
      goals: '◎ Goal / Intention',
      negative: '● Heavy Feeling',
      neutral: '◇ Neutral Observation'
    };

    els.nodeDetailTag.textContent = catLabels[node.category] || '◇ Thought';
    els.nodeDetailText.textContent = node.text;
    els.nodeDetailInsight.textContent = node.insight;
    els.nodeDetail.classList.remove('hidden');
  }

  function hideTooltip() {
    els.tooltip.classList.remove('visible');
  }

  function showTooltip(text, x, y) {
    els.tooltip.textContent = text;
    els.tooltip.classList.add('visible');
    // Position
    const tw = els.tooltip.offsetWidth;
    const th = els.tooltip.offsetHeight;
    const px = Math.min(window.innerWidth - tw - 10, x + 12);
    const py = Math.max(10, y - th - 10);
    els.tooltip.style.left = px + 'px';
    els.tooltip.style.top  = py + 'px';
  }

  // ——— Mood / Theme ———
  function setMood(moodKey) {
    document.body.className = document.body.className.replace(/mood-\w+/, '');
    document.body.classList.add(`mood-${moodKey}`);

    // Update pulse overlay color
    const pulseColors = {
      stress:   'rgba(240,98,146,0.06)',
      positive: 'rgba(105,240,174,0.06)',
      goals:    'rgba(64,196,255,0.06)',
      negative: 'rgba(239,83,80,0.06)',
      neutral:  'rgba(255,213,79,0.04)',
      mixed:    'rgba(123,140,255,0.05)'
    };
    els.pulseOverlay.style.setProperty('--pulse-color', pulseColors[moodKey] || 'rgba(123,140,255,0.05)');
  }

  function triggerEmotionPulse(dominant) {
    els.pulseOverlay.style.animation = 'none';
    void els.pulseOverlay.offsetWidth; // reflow
    els.pulseOverlay.style.animation = 'emotionPulse 4s ease-in-out infinite';
  }

  function toggleTheme() {
    const current = document.documentElement.dataset.theme || 'dark';
    document.documentElement.dataset.theme = current === 'dark' ? 'light' : 'dark';
    document.body.dataset.theme = current === 'dark' ? 'light' : 'dark';
  }

  // ——— Deep Mode ———
  function toggleDeep() {
    deepModeOn = !deepModeOn;
    els.btnDeep.classList.toggle('active', deepModeOn);
    els.btnDeep.textContent = deepModeOn ? '⬡ Exit Deep Mode' : '⬡ Deep Insight';
    if (deepModeOn) {
      Visualization.enableDeep();
    } else {
      Visualization.disableDeep();
    }
  }

  // ——— Timeline ———
  function renderTimeline() {
    if (history.length === 0) {
      els.timelineSection.style.display = 'none';
      return;
    }
    els.timelineSection.style.display = 'block';
    els.timelineBubbles.innerHTML = '';

    history.slice(0, 8).forEach((item, i) => {
      const bubble = document.createElement('button');
      bubble.className = 'timeline-bubble';
      bubble.textContent = item.text.slice(0, 25) + (item.text.length > 25 ? '…' : '');
      bubble.title = item.text.slice(0, 100);

      const d = new Date(item.timestamp);
      bubble.setAttribute('data-time', d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }));

      bubble.addEventListener('click', () => {
        els.input.value = item.text;
        onInputChange();
        // Reload that result
        currentResult = item;
        transitionToViz(item);
      });

      els.timelineBubbles.appendChild(bubble);
    });
  }

  // ——— Ambient Sound ———
  function toggleSound() {
    if (!soundEnabled) {
      startAmbientSound();
    } else {
      stopAmbientSound();
    }
    soundEnabled = !soundEnabled;
    els.btnSound.classList.toggle('active', soundEnabled);
  }

  function startAmbientSound() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

    // Generate rain-like white noise with filtering
    const bufferSize = audioCtx.sampleRate * 3;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);

    let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + white * 0.5362) * 0.11;
    }

    const source = audioCtx.createBufferSource();
    source.buffer = noiseBuffer;
    source.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 0.5;

    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 2);

    source.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start();

    UIController._soundSource = source;
    UIController._soundGain = gainNode;
  }

  function stopAmbientSound() {
    if (UIController._soundGain) {
      UIController._soundGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
    }
    setTimeout(() => {
      if (UIController._soundSource) {
        try { UIController._soundSource.stop(); } catch(e) {}
        UIController._soundSource = null;
      }
    }, 1600);
  }

  // ——— SVG gradient defs ———
  function injectSVGDefs() {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'defs-only');
    svg.innerHTML = `
      <defs>
        <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7b8cff"/>
          <stop offset="50%" stop-color="#4fc3f7"/>
          <stop offset="100%" stop-color="#69f0ae"/>
        </linearGradient>
      </defs>
    `;
    document.body.appendChild(svg);
  }

  // ——— Utilities ———
  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ——— Expose API ———
  return { init, showTooltip, hideTooltip, showNodeDetail };
})();

// ——— Boot ———
document.addEventListener('DOMContentLoaded', () => {
  UIController.init();
});
  </script>
